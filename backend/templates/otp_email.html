<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کد تأیید حساب کاربری</title>
</head>
<body style="margin:0; padding:0; background-color:#f1f5f9; font-family:Tahoma, Arial, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9; min-height:100vh;">
        <tr>
            <td align="center" style="padding:40px 16px;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px; background-color:#ffffff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); overflow:hidden;">

                    <!-- Header accent bar -->
                    <tr>
                        <td style="height:4px; background:linear-gradient(90deg,#3b82f6,#6366f1);"></td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding:40px 32px 32px; text-align:center;">
                            <p style="margin:0 0 8px; font-size:14px; color:#94a3b8; font-weight:400;">تأیید حساب کاربری</p>
                            <h1 style="margin:0 0 16px; font-size:22px; color:#1e293b; font-weight:700;">سلام!</h1>
                            <p style="margin:0 0 28px; font-size:15px; color:#475569; line-height:1.8;">
                                برای تکمیل ثبت‌نام خود، لطفاً کد زیر را در فرم تأیید وارد کنید.
                            </p>

                            <!-- OTP code box -->
                            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 28px;">
                                <tr>
                                    <td style="background-color:#eff6ff; border:2px solid #3b82f6; border-radius:12px; padding:18px 40px;">
                                        <span style="font-size:32px; font-weight:700; color:#2563eb; letter-spacing:8px; direction:ltr; font-family:'Courier New',Courier,monospace;">{{ otp }}</span>
                                    </td>
                                </tr>
                            </table>

                            <!-- Divider -->
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="border-top:1px solid #e2e8f0; font-size:0; line-height:0;">&nbsp;</td>
                                </tr>
                            </table>

                            <!-- Expiry note -->
                            <p style="margin:20px 0 0; font-size:13px; color:#94a3b8; line-height:1.7;">
                                این کد تا <strong style="color:#64748b;">۱۵ دقیقه</strong> معتبر است.
                                <br>
                                در صورت دریافت نکردن ایمیل، از گزینه «ارسال مجدد کد» استفاده کنید.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding:20px 32px; background-color:#f8fafc; border-top:1px solid #f1f5f9; text-align:center;">
                            <p style="margin:0; font-size:12px; color:#94a3b8; line-height:1.6;">
                                این ایمیل به صورت خودکار ارسال شده است.
                                <br>
                                لطفاً به این ایمیل پاسخ ندهید.
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
