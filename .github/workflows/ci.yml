# =============================================================================
# CI Pipeline – Reminder App
# =============================================================================
# Triggers on every push and pull-request targeting the main branch.
# Three jobs form a dependency graph:
#
#   backend-tests ──┐
#                    ├──▶ docker-build (sanity check)
#   frontend-build ──┘
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs for the same branch / PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Job 1 – Backend Tests
# ---------------------------------------------------------------------------
jobs:
  backend-tests:
    name: Backend Tests (Python 3.10)
    runs-on: ubuntu-latest

    # ── Ephemeral service containers ──────────────────────────────────────
    services:
      # MySQL service – mirrors production database engine
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_password
          MYSQL_DATABASE: ci_todo_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      # Redis service – used as Celery broker / result backend
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    # ── Environment variables injected into every step ────────────────────
    env:
      SECRET_KEY: ci-insecure-test-key-not-for-production
      DB_NAME: ci_todo_db
      DB_USER: root
      DB_PASSWORD: ci_password
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/0
      EMAIL_HOST_USER: ci@example.com
      EMAIL_HOST_PASSWORD: not-a-real-password

    steps:
      # ── 1. Checkout source code ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python with pip caching ───────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # ── 3. Install system-level libraries required by mysqlclient ──────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            default-libmysqlclient-dev \
            pkg-config

      # ── 4. Install Python packages ─────────────────────────────────────
      - name: Install Python dependencies
        working-directory: backend
        run: pip install --no-cache-dir -r requirements.txt

      # ── 5. Run Django test suite ────────────────────────────────────────
      - name: Run tests
        working-directory: backend
        run: python manage.py test --verbosity=2

  # ---------------------------------------------------------------------------
  # Job 2 – Frontend Build
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js with npm caching ─────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install npm dependencies ────────────────────────────────────
      - name: Install dependencies
        working-directory: frontend
        run: npm install

      # ── 4. Build the Vite React app ────────────────────────────────────
      - name: Build production bundle
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # Job 3 – Docker Sanity Check
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      # ── 1. Checkout source code ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build all images defined in docker-compose.yml ──────────────
      # Validates Dockerfiles, dependency graphs, and layer integrity
      # in an isolated runner without pushing any images.
      - name: Build Docker images
        run: docker compose build
