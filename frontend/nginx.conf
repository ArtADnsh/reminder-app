server {
    listen 80;
    server_name localhost;

    # Reverse proxy for API requests to Django backend
    location /api/ {
        proxy_pass http://reminder_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy for Django admin
    location /admin/ {
        proxy_pass http://reminder_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files collected by Django
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Serve media files uploaded by users
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # SPA routing — serve React app for all other routes
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Cache static frontend assets aggressively
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
